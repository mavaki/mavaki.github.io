    web_url: https://mavaki.com/archlinux
    image_url: https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2Fwiki.installgentoo.com%2Fimages%2Ff%2Ff9%2FArch-linux-logo.png&f=1&nofb=1&ipt=6ef6bbd27e4dc00254f289bf90b58f0c0fa1321d911db3295293ad41411c74c5&ipo=images

  - name: Board Games
    web_url: https://mavaki.com/boardgames
